name: CI Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install Dependencies
      run: composer install

    - name: Copy ENV
      run: cp .env.example .env

    - name: Generate Key
      run: php artisan key:generate

    - name: Run Tests
      run: php artisan test
